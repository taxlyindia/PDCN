<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Internal Chat – CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/dashboard.css"/>
<script src="/static/js/app.js"></script>
<style>
/* ── Layout ── */
.chat-shell{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px);overflow:hidden}
.contacts-panel{border-right:2px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
.contacts-header{padding:16px;border-bottom:1px solid var(--border)}
.contacts-search{display:flex;align-items:center;gap:8px;background:var(--primary-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.contacts-search input{border:none;background:transparent;color:var(--ink);font-size:13px;font-family:'Nunito',sans-serif;width:100%;outline:none}
.contacts-list{flex:1;overflow-y:auto}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(45,45,68,.3);transition:background .15s;position:relative}
.contact-item:hover,.contact-item.active{background:var(--blue-pale)}
.contact-item.active{border-left:3px solid #6366f1}
.contact-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-role{font-size:11px;color:var(--ink2);margin-top:2px}
.contact-last{font-size:11px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.contact-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.contact-time{font-size:10px;color:var(--muted)}
.unread-badge{background:#6366f1;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ── Chat Window ── */
.chat-window{display:flex;flex-direction:column;background:var(--cobalt-pale)}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface)}
.chat-header-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.chat-header-name{font-weight:700;font-size:15px}
.chat-header-role{font-size:12px;color:var(--muted)}
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:70%}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-row.theirs{align-self:flex-start}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;max-width:100%;word-break:break-word}
.mine .msg-bubble{background:var(--g-indigo);color:#fff;border-bottom-right-radius:3px;box-shadow:0 2px 8px rgba(79,70,229,.2)}
.theirs .msg-bubble{background:#f8fafc;border:1px solid var(--border);border-bottom-left-radius:3px;color:var(--tx-1)}
.msg-time{font-size:10px;color:var(--ink2);margin-top:3px;text-align:right}
.msg-claim-ref{font-size:11px;margin-top:4px;padding:3px 8px;background:var(--blue-pale);border-radius:4px;color:var(--primary);cursor:pointer}
.date-separator{text-align:center;font-size:11px;color:var(--ink2);margin:8px 0;position:relative}
.date-separator::before,.date-separator::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.date-separator::before{left:0}.date-separator::after{right:0}

/* ── Input Bar ── */
.chat-input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--surface)}
.chat-input{flex:1;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--primary-bg);color:var(--ink);font-size:14px;font-family:'Nunito',sans-serif;resize:none;min-height:42px;max-height:120px;outline:none;line-height:1.5}
.chat-input:focus{border-color:var(--blue)}
.send-btn{width:42px;height:42px;border-radius:10px;background:var(--primary);border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover{background:var(--primary-h);transform:scale(1.05)}
.send-btn:disabled{background:#374151;cursor:not-allowed}

/* ── Empty state ── */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink2);gap:12px}
.empty-chat .icon{font-size:56px}

/* ── Role color dots ── */
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:4px}
.rdot-dealer{background:#ec4899}.rdot-cn_team{background:#06b6d4}.rdot-finance_team{background:#10b981}
.rdot-cfa_team{background:#8b5cf6}.rdot-finance_cfa_team{background:#c4b5fd}.rdot-tenant_admin{background:#f59e0b}

@media(max-width:640px){
  .chat-shell{grid-template-columns:1fr}
  .contacts-panel{display:none}
  .contacts-panel.mobile-open{display:flex;position:fixed;inset:0;z-index:100}
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">T</div>
    <div>
      <div class="name">PDCN <span>CRM</span></div>
      <div class="badge">Workflow</div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">PDCN Workflow</div>
    <a class="nav-item" href="/templates/pdcn-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
    <a class="nav-item active" href="/templates/chat.html"><span class="nav-icon">💬</span>Internal Chat <span id="sidebar-unread" style="display:none;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px">0</span></a>
    <a class="nav-item" href="/templates/pdcn-sales-template.html"><span class="nav-icon">📥</span>Reports</a>
    <a class="nav-item" href="/templates/pdcn-new-claim.html" id="snav-new" style="display:none"><span class="nav-icon">➕</span>New Claim</a>
    <a class="nav-item" href="/templates/pdcn-sales-register.html" id="snav-sales" style="display:none"><span class="nav-icon">📊</span>Sales Register</a>
    <a class="nav-item" href="/templates/help-videos.html"><span class="nav-icon">🎓</span>Help &amp; Training</a>
  </div>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="t-avatar">U</div>
      <div class="user-info"><div class="user-name" id="t-name">User</div><div class="user-role" id="t-role">—</div></div>
      <button class="logout-btn" id="logout-btn">⏻</button>
    </div>
  </div>
</aside>

<div class="main-content" style="padding:0;overflow:hidden">
  <div class="topbar" style="padding:0 16px">
    <span class="topbar-title">💬 Internal Chat</span>
  </div>
  <div class="chat-shell">
    <!-- Contacts -->
    <div class="contacts-panel" id="contacts-panel">
      <div class="contacts-header">
        <div style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;margin-bottom:10px">Messages</div>
        <div class="contacts-search">
          <span style="color:var(--tx-3)">🔍</span>
          <input id="contact-search" placeholder="Search team members…" oninput="debounceSearch()"/>
        </div>
      </div>
      <div class="contacts-list" id="contacts-list">
        <div style="padding:20px;text-align:center;color:var(--ink2);font-size:13px">Loading…</div>
      </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chat-window">
      <div class="empty-chat" id="empty-state">
        <div class="icon">💬</div>
        <div style="font-size:16px;font-weight:600;color:var(--muted)">Select a conversation</div>
        <div style="font-size:13px;color:var(--muted)">Choose a team member from the left to start chatting</div>
      </div>
      <div id="active-chat" style="display:none;flex:1;flex-direction:column;display:none">
        <div class="chat-header" id="chat-header">
          <div class="chat-header-avatar" id="ch-avatar">?</div>
          <div>
            <div class="chat-header-name" id="ch-name">—</div>
            <div class="chat-header-role" id="ch-role">—</div>
          </div>
        </div>
        <div class="messages-area" id="messages-area"></div>
        <div class="chat-input-bar">
          <textarea class="chat-input" id="chat-input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var currentOtherUserId = null;
var myId = null;
var pollTimer = null;
var searchTimer = null;
var lastMsgCount = 0;

document.addEventListener('DOMContentLoaded', function(){
  var u = getUser();
  if(!u || !getToken()){ window.location.href='/templates/login.html'; return; }
  myId = u.id;
  document.getElementById('t-name').textContent = u.full_name || '';
  document.getElementById('t-avatar').textContent = (u.full_name||'U').slice(0,2).toUpperCase();
  document.getElementById('t-role').textContent = (u.role||'').replace(/_/g,' ');
  if(u.company_name) document.getElementById('t-company').textContent = u.company_name;
  document.getElementById('logout-btn').onclick = doLogout;

  // Role-based sidebar
  if(u.role === 'tenant_admin'){ window.location.href='/templates/tenant-dashboard.html'; return; }
  if(u.role === 'dealer'){ var sn=document.getElementById('snav-new');if(sn)sn.style.display=''; }
  if(['finance_team','finance_cfa_team'].includes(u.role)){ var ss=document.getElementById('snav-sales');if(ss)ss.style.display=''; }

  // Check if URL has a target user
  var params = new URLSearchParams(window.location.search);
  var targetUser = params.get('user');

  loadContacts(function(){
    if(targetUser) openChat(targetUser);
  });

  // Enter key to send
  document.getElementById('chat-input').addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
  });

  // Auto-resize textarea
  document.getElementById('chat-input').addEventListener('input', function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,120)+'px';
  });

  // Poll for new messages every 8s (pause when tab is hidden)
  pollTimer = setInterval(function(){
    if(!document.hidden) pollMessages();
  }, 8000);
  // Also reload contacts every 60s for online status changes
  setInterval(function(){
    if(!document.hidden) loadUnreadCount();
  }, 30000);
  loadUnreadCount();
});

function getToken(){ return localStorage.getItem('access_token'); }
function getUser(){ try{ return JSON.parse(localStorage.getItem('user')||'null'); }catch{ return null; } }
function doLogout(){ clearInterval(pollTimer); localStorage.clear(); window.location.href='/templates/login.html'; }

async function callAPI(path, opts){
  opts = opts||{};
  var headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  var tok = getToken(); if(tok) headers['Authorization']='Bearer '+tok;
  var res = await fetch('/api/v1'+path, Object.assign({},opts,{headers:headers}));
  if(!res.ok){ var e=await res.json().catch(function(){return{detail:res.statusText};}); throw new Error(e.detail||'Error'); }
  return res.json();
}

function roleColor(role){
  var map={dealer:'#ec4899',cn_team:'#06b6d4',finance_team:'#10b981',cfa_team:'#8b5cf6',finance_cfa_team:'#c4b5fd',tenant_admin:'#f59e0b'};
  return map[role]||'#6366f1';
}
function roleLabel(role){ return (role||'').replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
function initials(name){ return (name||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(); }
function fmtTime(iso){ if(!iso)return''; var d=new Date(iso); return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso){ if(!iso)return''; var d=new Date(iso); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }

var contactsData = [];
function debounceSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(function(){ loadContacts(); },300); }

async function loadContacts(cb){
  var s = document.getElementById('contact-search').value;
  var url = '/chat/users' + (s?'?search='+encodeURIComponent(s):'');
  try{
    contactsData = await callAPI(url);
    renderContacts();
    if(cb) cb();
  }catch(e){ document.getElementById('contacts-list').innerHTML='<div style="padding:20px;color:#ef4444;font-size:13px">'+e.message+'</div>'; }
}

function renderContacts(){
  var list = document.getElementById('contacts-list');
  if(!contactsData.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--ink2);font-size:13px">No team members to chat with</div>';
    return;
  }
  list.innerHTML = contactsData.map(function(u){
    var isActive = currentOtherUserId === u.id;
    var lastMsg = u.last_message ? (u.last_message.length>36 ? u.last_message.slice(0,36)+'…' : u.last_message) : '';
    var timeStr = u.last_message_at ? fmtTime(u.last_message_at) : '';
    return '<div class="contact-item'+(isActive?' active':'')+'" onclick="openChat(\''+u.id+'\')" id="contact-'+u.id+'">'+
      '<div class="contact-avatar" style="background:linear-gradient(135deg,'+roleColor(u.role)+','+roleColor(u.role)+'99)">'+initials(u.full_name)+'</div>'+
      '<div class="contact-info">'+
        '<div class="contact-name">'+u.full_name+'</div>'+
        '<div class="contact-role"><span class="rdot rdot-'+u.role+'"></span>'+roleLabel(u.role)+'</div>'+
        (lastMsg?'<div class="contact-last">'+lastMsg+'</div>':'')+
      '</div>'+
      '<div class="contact-meta">'+
        (timeStr?'<div class="contact-time">'+timeStr+'</div>':'')+
        (u.unread?'<div class="unread-badge" id="unread-'+u.id+'">'+u.unread+'</div>':'<div class="unread-badge" id="unread-'+u.id+'" style="display:none">0</div>')+
      '</div>'+
    '</div>';
  }).join('');
}

async function openChat(userId){
  currentOtherUserId = userId;
  lastMsgCount = 0;

  // Update active state in contacts
  document.querySelectorAll('.contact-item').forEach(function(el){ el.classList.remove('active'); });
  var contactEl = document.getElementById('contact-'+userId);
  if(contactEl) contactEl.classList.add('active');

  // Get conversation info
  try{
    var info = await callAPI('/chat/conversation/'+userId);
    var other = info.other_user;

    document.getElementById('ch-avatar').textContent = initials(other.full_name);
    document.getElementById('ch-avatar').style.background = 'linear-gradient(135deg,'+roleColor(other.role)+','+roleColor(other.role)+'99)';
    document.getElementById('ch-name').textContent = other.full_name;
    document.getElementById('ch-role').textContent = roleLabel(other.role);

    document.getElementById('empty-state').style.display = 'none';
    var ac = document.getElementById('active-chat');
    ac.style.display = 'flex';
    ac.style.flexDirection = 'column';
    ac.style.flex = '1';

    await loadMessages();
    document.getElementById('chat-input').focus();
  }catch(e){
    showToast(e.message,'error');
  }
}

async function loadMessages(){
  if(!currentOtherUserId) return;
  try{
    var d = await callAPI('/chat/conversation/'+currentOtherUserId+'/messages?per_page=80');
    if(d.total === lastMsgCount && lastMsgCount > 0) return; // no new messages
    var hadNewMsgs = lastMsgCount > 0 && d.total !== lastMsgCount;
    lastMsgCount = d.total;
    renderMessages(d.messages);
    // Only refresh contacts unread badges if new messages arrived
    if(hadNewMsgs){
      refreshContactUnread();
      loadUnreadCount();
    }
  }catch(e){ console.warn('loadMessages',e); }
}

function renderMessages(messages){
  var area = document.getElementById('messages-area');
  var wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;

  var html = '';
  var lastDate = '';
  messages.forEach(function(m){
    var d = m.created_at ? new Date(m.created_at) : null;
    var dateStr = d ? d.toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'short'}) : '';
    if(dateStr !== lastDate){
      html += '<div class="date-separator">'+dateStr+'</div>';
      lastDate = dateStr;
    }
    var mine = m.is_mine;
    html += '<div class="msg-row '+(mine?'mine':'theirs')+'">'+
      (!mine?'<div class="msg-avatar" style="background:linear-gradient(135deg,'+roleColor(m.sender_role)+','+roleColor(m.sender_role)+'99)">'+initials(m.sender_name)+'</div>':'')+
      '<div>'+
        (!mine?'<div style="font-size:11px;color:var(--ink2);margin-bottom:3px">'+m.sender_name+' · '+roleLabel(m.sender_role)+'</div>':'')+
        '<div class="msg-bubble">'+escHtml(m.message)+'</div>'+
        (m.claim_ref?'<div class="msg-claim-ref" onclick="window.open(\'/templates/pdcn-claim-detail.html?id='+m.claim_ref+'\')">📋 View Claim</div>':'')+
        '<div class="msg-time">'+fmtTime(m.created_at)+'</div>'+
      '</div>'+
    '</div>';
  });

  if(!messages.length) html='<div style="text-align:center;padding:40px;color:var(--ink2);font-size:13px">No messages yet. Say hello! 👋</div>';
  area.innerHTML = html;
  if(wasAtBottom || lastMsgCount <= 20) area.scrollTop = area.scrollHeight;
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>'); }

async function sendMsg(){
  var input = document.getElementById('chat-input');
  var msg = input.value.trim();
  if(!msg || !currentOtherUserId) return;
  var btn = document.getElementById('send-btn');
  btn.disabled = true;
  try{
    var sent = await callAPI('/chat/conversation/'+currentOtherUserId+'/messages',{
      method:'POST', body:JSON.stringify({message:msg})
    });
    input.value = '';
    input.style.height = 'auto';
    // Refresh messages without triggering contacts reload
    lastMsgCount = 0; // force re-render
    await loadMessages();
  }catch(e){ showToast(e.message,'error'); }
  btn.disabled = false;
  input.focus();
}

// Lightweight: only refresh unread counts on contact list, not full reload
async function refreshContactUnread(){
  try{
    var fresh = await callAPI('/chat/users');
    // Update unread badges without re-rendering the whole list
    fresh.forEach(function(u){
      var badge = document.getElementById('unread-'+u.id);
      if(badge){
        if(u.unread > 0){ badge.style.display='inline'; badge.textContent=u.unread; }
        else badge.style.display='none';
      }
    });
  }catch(e){}
}

var pollContactsCounter = 0;
async function pollMessages(){
  if(!currentOtherUserId) return;
  await loadMessages();
  // Refresh full contacts list every 6th poll (~60s) to pick up new users
  pollContactsCounter++;
  if(pollContactsCounter % 6 === 0) loadContacts();
}

async function loadUnreadCount(){
  try{
    var d = await callAPI('/chat/unread-count');
    var badge = document.getElementById('sidebar-unread');
    if(d.unread_count > 0){
      badge.style.display='inline';
      badge.textContent = d.unread_count;
    } else {
      badge.style.display='none';
    }
  }catch(e){}
}

function showToast(msg,type){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;top:20px;right:20px;z-index:9999;background:var(--surface);color:var(--ink);padding:14px 20px;border-radius:10px;border-left:4px solid '+(type==='error'?'#ef4444':'#10b981')+';box-shadow:0 8px 32px rgba(0,0,0,.4);font-size:14px;min-width:260px;cursor:pointer';
  t.textContent=msg;t.onclick=function(){t.remove();};
  document.body.appendChild(t);setTimeout(function(){t.remove();},4000);
}
</script>
</body>
</html>
