<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forgot Password – PDCN CRM</title>

<script src="/static/js/app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0a0a12;--surface:#12121e;--border:#1e1e32;--accent:#6366f1;--text:#e2e8f0;--muted:#64748b; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 60% 50% at 50% 40%, #1a1040 0%, transparent 70%); }
.card { position:relative;z-index:1; background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.5); }
.logo { display:flex;align-items:center;gap:10px;margin-bottom:32px; }
.logo-icon { width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px; }
.logo-name { font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800; }
h2 { font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px; }
p.sub { color:var(--ink2);font-size:14px;margin-bottom:28px;line-height:1.6; }
.form-group { margin-bottom:18px; }
label { display:block;font-size:13px;font-weight:500;color:var(--cobalt);margin-bottom:6px; }
input { width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--ink);font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:border-color 0.2s; }
input:focus { border-color:var(--accent); }
input::placeholder { color:var(--ink2); }
.btn { width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,0.4);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px; }
.btn:hover { transform:translateY(-1px); }
.btn:disabled { opacity:0.6;cursor:not-allowed;transform:none; }
.back-link { display:block;text-align:center;color:var(--ink2);font-size:13px;margin-top:20px;text-decoration:none; }
.back-link:hover { color:var(--accent); }
.success-box { background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;padding:14px 16px;border-radius:10px;font-size:14px;display:none;margin-bottom:16px;line-height:1.6; }
.error-box { background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:13px;display:none;margin-bottom:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-icon">⚡</div><div class="logo-name">PDCN CRM</div></div>
  <h2>Forgot Password</h2>
  <p class="sub">Enter your email address and we'll send you a link to reset your password.</p>
  <div class="success-box" id="success-box">✅ Check your inbox! If your email is registered, a reset link has been sent. The link expires in 30 minutes.</div>
  <div class="error-box" id="error-box"></div>
  <form id="fp-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="fp-email" placeholder="you@company.com" required/>
    </div>
    <button type="submit" class="btn" id="fp-btn">Send Reset Link →</button>
  </form>
  <a href="/templates/login.html" class="back-link">← Back to Login</a>
</div>

<script>
document.getElementById('fp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('error-box').style.display = 'none';
  const btn = document.getElementById('fp-btn');
  setLoading(btn, true);
  try {
    await api.post('/auth/forgot-password', { email: document.getElementById('fp-email').value });
    document.getElementById('success-box').style.display = 'block';
    document.getElementById('fp-form').style.display = 'none';
  } catch(err) {
    document.getElementById('error-box').textContent = err.message;
    document.getElementById('error-box').style.display = 'block';
  } finally { setLoading(btn, false); }
});
</script>
</body>
</html>
